<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HitchedUp4Life</title>

  <style>
    :root {
      --cream: #fff4df;
      --paper: #fffaf0;
      --orange: #e68616;
      --teal: #198f8a;
      --brown: #4a260e;
      --dark: #18212b;
      --muted: #6d5b4f;
      --line: rgba(74, 38, 14, 0.16);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--cream);
      color: var(--dark);
    }

    .wrap {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand-logo {
      width: 220px;
    }

    .email-pill {
      border: 2px solid var(--brown);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: bold;
      color: var(--brown);
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 20px;
    }

    .hero-copy {
      flex: 1;
    }

    .family-badge {
      width: 80px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
      color: var(--brown);
    }

    .hero-copy p {
      color: var(--muted);
    }

    .rig-img {
      flex: 1;
      max-width: 500px;
      width: 100%;
    }

    .links-section {
      display: flex;
      gap: 15px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .link-card {
      flex: 1;
      min-width: 200px;
      background: var(--paper);
      border: 2px solid var(--line);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
    }

    .link-card img {
      width: 35px;
      height: 35px;
      margin-bottom: 10px;

      /* THIS FIXES THE ICON VISIBILITY */
      filter: brightness(0) saturate(100%) invert(16%) sepia(28%) saturate(1233%) hue-rotate(349deg) brightness(92%) contrast(92%);
    }

    .newsletter {
      margin-top: 40px;
      background: var(--dark);
      color: white;
      padding: 25px;
      border-radius: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      background: var(--orange);
      color: white;
      font-weight: bold;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="topbar">
      <img src="logo.png" class="brand-logo">
      <div class="email-pill">TheFam@HitchedUp4Life.com</div>
    </div>

    <div class="hero">
      <div class="hero-copy">
        <img src="family.jpg" class="family-badge">
        <h1>Real life from the road.</h1>
        <p>We’re roadschooling our way across America — sharing the parks, the food, the fixes, and the real moments.</p>
      </div>

      <img src="rig.png" class="rig-img">
    </div>

    <div class="links-section">
      <a href="https://www.youtube.com/@HitchedUp4Life" class="link-card" target="_blank">
        <img src="youtube.png">
        <h3>YouTube</h3>
      </a>

      <a href="https://www.instagram.com/hitchedup4life/" class="link-card" target="_blank">
        <img src="instagram.png">
        <h3>Instagram</h3>
      </a>

      <a href="https://www.facebook.com/people/HitchedUp4Life/61578180429478/" class="link-card" target="_blank">
        <img src="facebook.png">
        <h3>Facebook</h3>
      </a>
    </div>

    <div class="newsletter">
      <h2>Stay Hitched Up</h2>
      <p>Real updates. No spam.</p>

      <!-- Replace with MailerLite later -->
      <input placeholder="Your email">
      <button>Join the crew</button>
    </div>

    <footer>
      © HitchedUp4Life
    </footer>

  </div>
</body>
</html>
